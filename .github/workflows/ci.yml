name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'Server/**'
  push:
    branches: [main]
    paths:
      - 'Server/**'

jobs:
  server:
    name: Server checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: greenskills
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: Server/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v -race -count=1 ./...

      - name: Integration tests
        run: go test -v -race -count=1 -tags=integration ./...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/greenskills?sslmode=disable
          JWT_SECRET: ci-test-secret
